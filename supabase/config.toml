project_id = "gainly"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://giggling-unsafe-sixth.ngrok-free.dev/**"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
# NOTE: in supabase CLI 1.226.4, setting `enable_signup = false` here
# disables the email provider entirely (login + signup). Signup is
# already blocked by the top-level `[auth] enable_signup = false`, so
# we leave this true so password login keeps working.
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "500MiB"

[realtime]
enabled = true

[analytics]
enabled = false

[functions.send-push]
verify_jwt = false
